<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard | Hack My Heart</title>

  <!-- your normal site styles -->
  <link rel="stylesheet" href="/assets/styles.css">
  <!-- scoreboard-only styles -->
  <link rel="stylesheet" href="/assets/scoreboard.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/assets/Main_HMH_CTF_Logo.png" alt="Logo">
      <div>
        <div class="brand-title">Hack My Heart</div>
        <div class="brand-subtitle">Scoreboard</div>
      </div>
    </div>
    <nav class="nav">
      <a href="/">Challenges</a>
      <a href="/scoreboard.html">Scoreboard</a>
      <a href="/login.html">Login</a>
    </nav>
  </header>

  <main class="scoreboard-wrap">
    <h2 class="sb-title">Scoreboard</h2>

    <div class="sb-card">
      <canvas id="scoreChart" height="120"></canvas>
    </div>

    <div class="sb-gap"></div>

    <div class="sb-card">
      <h3 style="margin:0 0 12px;">Standings</h3>
      <table class="sb-table">
        <thead>
          <tr>
            <th class="sb-left">Rank</th>
            <th class="sb-left">User</th>
            <th class="sb-right">Points</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    async function loadScoreboard() {
      const res = await fetch("/api/scoreboard");
      if (!res.ok) {
        alert("Failed to load scoreboard");
        return;
      }
      const data = await res.json();
      const board = data.scoreboard || [];

      // table
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      board.forEach((u, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="sb-left">${i + 1}</td>
          <td class="sb-left">${u.username}</td>
          <td class="sb-right">${Number(u.score)}</td>
        `;
        tbody.appendChild(tr);
      });

      // line chart (usernames vs score)
      const labels = board.map(x => x.username);
      const scores = board.map(x => Number(x.score));

      new Chart(document.getElementById("scoreChart"), {
        type: "line",
        data: {
          labels,
          datasets: [{ label: "Points", data: scores, tension: 0.25 }]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    loadScoreboard();
  </script>
</body>
</html>
