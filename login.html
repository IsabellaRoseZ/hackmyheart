<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Hack My Heart</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>

<body class="auth-page">

  <main class="auth-center">
    <section class="login-card">

      <div class="logo-box">
        <img
          src="/assets/Main_HMH_CTF_Logo.png"
          alt="Hack My Heart Logo"
          class="logo-img"
        />
      </div>

      <h1 class="login-title">Hack My Heart</h1>
      <p class="login-subtitle">Cybersecurity Club at CSU Stanislaus</p>

      <label class="login-label">Username</label>
      <input id="user" placeholder="Username" autocomplete="username">

      <label class="login-label">Password</label>
      <input id="pass" type="password" placeholder="Password" autocomplete="current-password">

      <button id="btn" class="login-btn">Login</button>

      <p class="login-alt">
        No account? <a href="/register.html">Register</a>
      </p>

      <p id="msg" class="login-msg"></p>

    </section>

    <footer class="login-footer">
      Made with 💖 by the Cybersecurity Club at California State University, Stanislaus
    </footer>
  </main>

  <script>
    btn.onclick = async () => {
      msg.textContent = "";
      btn.disabled = true;
      btn.textContent = "Logging in…";

      try {
        const r = await fetch("/api/auth_login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: user.value,
            password: pass.value
          })
        });

        if (r.ok) {
          window.location.href = "/";
          return;
        }

        msg.textContent = await r.text();
      } catch {
        msg.textContent = "Network error. Please try again.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    };
  </script>

</body>
</html>
