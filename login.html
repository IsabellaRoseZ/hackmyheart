<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login | Hack My Heart</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="auth-page">

  <!-- decorative hearts -->
  <div class="hearts" aria-hidden="true">
    <span class="heart h1">♥</span>
    <span class="heart h2">♥</span>
    <span class="heart h3">♥</span>
    <span class="heart h4">♥</span>
    <span class="heart h5">♥</span>
    <span class="heart h6">♥</span>
    <span class="heart h7">♥</span>
    <span class="heart h8">♥</span>
  </div>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="logo-frame">
        <img
          src="/assets/Main_HMH_CTF_Logo.png"
          alt="Hack My Heart Logo"
          class="auth-logo"
        />
      </div>

      <h1 class="auth-title">Hack My Heart</h1>
      <p class="auth-subtitle">Cybersecurity Club at CSU Stanislaus</p>

      <label class="auth-label" for="user">Username</label>
      <input id="user" autocomplete="username" placeholder="Username" />

      <label class="auth-label" for="pass">Password</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="Password" />

      <button id="btn">Login</button>

      <p class="auth-alt">
        No account? <a href="/register.html">Register</a>
      </p>

      <p id="msg" class="auth-msg" role="status" aria-live="polite"></p>
    </div>

    <footer class="auth-footer">
      Made with love by the Cybersecurity Club at California State University, Stanislaus
    </foo
