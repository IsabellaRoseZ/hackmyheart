<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Hack My Heart</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="auth-page">

<div class="snowflakes" aria-hidden="true">
  <div class="snowflake"><img src="/assets/heartflake.png" width="26" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="20" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="28" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="22" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="30" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="18" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="24" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="20" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="26" alt=""></div>
  <div class="snowflake"><img src="/assets/heartflake.png" width="22" alt=""></div>
</div>

  <main class="auth-shell">
    <section class="auth-card auth-card--glass">
      <div class="logo-frame logo-frame--fancy">
        <img src="/assets/Main_HMH_CTF_Logo.png" alt="Hack My Heart Logo" class="auth-logo" />
      </div>

      <h1 class="auth-title">Hack My Heart</h1>
      <p class="auth-subtitle">Cybersecurity Club at CSU Stanislaus • Spring 2026</p>

      <div class="auth-form">
        <label class="auth-label" for="user">Username</label>
        <input id="user" autocomplete="username" placeholder="e.g. isabella" />

        <label class="auth-label" for="pass">Password</label>
        <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />

        <button id="btn" class="btn-primary">Login</button>

        <p class="auth-alt">
          No account? <a href="/register.html">Register</a>
        </p>

        <p id="msg" class="auth-msg" role="status" aria-live="polite"></p>
      </div>
    </section>

    <footer class="auth-footer">
      Made with love by the Cybersecurity Club at California State University, Stanislaus
    </footer>
  </main>

  <script>
    const setBusy = (busy) => {
      btn.disabled = busy;
      btn.textContent = busy ? "Logging in…" : "Login";
    };

    btn.onclick = async () => {
      msg.textContent = "";
      setBusy(true);

      try {
        const r = await fetch("/api/auth_login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user.value, password: pass.value })
        });

        if (r.ok) {
          window.location.href = "/";
          return;
        }

        const t = await r.text();
        msg.textContent = t || "Login failed. Please try again.";
      } catch {
        msg.textContent = "Network error. Please try again.";
      } finally {
        setBusy(false);
      }
    };

    // submit on Enter in password field
    pass.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btn.click();
    });
  </script>
</body>
</html>
