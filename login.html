<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login | HackMyHeart</title>
</head>
<body>
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password (8+ chars)">
  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script>
    async function login() {
      const res = await fetch("/api/auth_login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: user.value,
          password: pass.value
        })
      });

      msg.textContent = res.ok ? "Logged in!" : "Login failed";
    }
  </script>
</body>
</html>
