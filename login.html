<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login | Hack My Heart</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <img
      src="/assets/Main_HMH_CTF_Logo.png"
      alt="Hack My Heart Logo"
      class="auth-logo"
    />

    <h1 class="auth-title">Hack My Heart</h1>
    <p class="auth-subtitle">Cybersecurity Club at CSU Stanislaus</p>

    <input id="user" placeholder="Username" />
    <input id="pass" type="password" placeholder="Password" />
    <button id="btn">Login</button>

    <p class="auth-alt">
      No account?
      <a href="/register.html">Register</a>
    </p>

    <pre id="msg"></pre>
  </div>

  <script>
    btn.onclick = async () => {
      msg.textContent = "Logging in...";
      const r = await fetch("/api/auth_login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: user.value,
          password: pass.value
        })
      });

      const t = await r.text();
      msg.textContent = `Status ${r.status}: ${t}`;

      if (r.ok) window.location.href = "/";
    };
  </script>
</body>
</html>
